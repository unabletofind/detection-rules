title: OneNote Spawning Suspicious Child Process
id: 8a3f9b21-5e7c-4b3d-9f2a-1c8d4e6f7a92
status: stable
description: |
  Detects OneNote.exe spawning scripting engines or LOLBins.
  OneNote attachments became a favored phishing payload after
  Microsoft restricted macros — this rule catches the post-click
  execution chain.
author: Swetha Devi (@unabletofind)
date: 2026/03/15
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://attack.mitre.org/techniques/T1059/
tags:
  - attack.execution
  - attack.t1204.002
  - attack.t1059
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    ParentImage|endswith: '\ONENOTE.EXE'
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  condition: selection
falsepositives:
  - Legitimate user macros (rare in modern enterprise environments)
  - IT support scripts triggered from OneNote-linked documentation
level: high
